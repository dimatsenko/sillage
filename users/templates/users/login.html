<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Вхід - Sillage</title>
</head>
<body>
    <h2>Вхід</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Увійти</button>
    </form>
    <p>Немає акаунту? <a href="{% url 'users:register' %}">Зареєструватися</a></p>
    
    <form method="POST" action="{% url 'users:logout' %}" style="margin-top: 20px;">
        {% csrf_token %}
        <button type="submit">Вийти (для тесту)</button>
    </form>
</body>
</html>
